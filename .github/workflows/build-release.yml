name: Build & Release

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: write

# Deux pushes rapprochés ne doivent pas calculer la même version et se battre sur le tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 0 : Calcul de la prochaine version (conventional commits)
  # ──────────────────────────────────────────────────────────────────────────────
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      release-name: ${{ steps.compute.outputs.release-name }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compute version
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          # Dernier tag de release strict (vX.Y.Z). Les anciens tags suffixés
          # (v1.0.0-61, v1.0.0-dev.12+sha) sont volontairement ignorés.
          BASE_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

          if [ -n "$BASE_TAG" ]; then
            BASE_VERSION="${BASE_TAG#v}"
            RANGE="${BASE_TAG}..HEAD"
          else
            # Aucun tag de release : on part de la version du pom, sur tout l'historique.
            BASE_VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
            RANGE=""
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          SUBJECTS=$(git log ${RANGE:+$RANGE} --format=%s)
          BODIES=$(git log ${RANGE:+$RANGE} --format=%b)

          # Défaut patch : un push de chore/docs produit quand même un tag distinct.
          LEVEL="patch"
          if grep -qE '^[a-zA-Z]+(\(.+\))?!:' <<< "$SUBJECTS" || grep -q 'BREAKING CHANGE:' <<< "$BODIES"; then
            LEVEL="major"
          elif grep -qE '^feat(\(.+\))?!?:' <<< "$SUBJECTS"; then
            LEVEL="minor"
          fi

          case "$LEVEL" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)

          if [ "$BRANCH" = "main" ]; then
            TAG="v${VERSION}"
            PRERELEASE="false"
            RELEASE_NAME="Release v${VERSION}"
          else
            # Prerelease SemVer valide : trie bien en-dessous du futur vX.Y.Z.
            TAG="v${VERSION}-dev.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
            PRERELEASE="true"
            RELEASE_NAME="Pre-release dev v${VERSION} (#${GITHUB_RUN_NUMBER})"
          fi

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "release-name=$RELEASE_NAME"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Version"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| base | ${BASE_TAG:-_aucun tag, base pom ${BASE_VERSION}_} |"
            echo "| bump | \`$LEVEL\` |"
            echo "| version | \`$VERSION\` |"
            echo "| tag | \`$TAG\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────
  # Job 1 : Compilation + tests
  # ────────────────────────────────────────────
  build-linux:
    name: Compile & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compilation check
        run: mvn -B -ntp compile

      - name: Run tests
        run: mvn -B -ntp test

  # ────────────────────────────────────────────
  # Job 2 : Fat JAR (Windows, Linux, macOS)
  # ────────────────────────────────────────────
  build-fatjar:
    name: Build Fat JAR (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [version, build-linux]
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: admin-desktop-windows
          - os: ubuntu-latest
            artifact-name: admin-desktop-linux
          - os: macos-latest
            artifact-name: admin-desktop-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Appliquer la version calculée
        shell: bash
        run: |
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion="${{ needs.version.outputs.version }}" \
            -DgenerateBackupPoms=false

      - name: Package Fat JAR (prod endpoints, skip tests)
        run: mvn -B -ntp -Pprod package -DskipTests

      - name: Locate fat JAR
        id: locate-jar
        shell: bash
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name "*.jar" ! -name "original-*.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::No fat JAR found in target/"
            exit 1
          fi
          JAR_NAME=$(basename "$JAR_PATH")
          echo "jar-path=$JAR_PATH"  >> "$GITHUB_OUTPUT"
          echo "jar-name=$JAR_NAME"  >> "$GITHUB_OUTPUT"
          echo "Fat JAR trouvé : $JAR_NAME"

      - name: Renommer le JAR
        shell: bash
        run: |
          cp "target/${{ steps.locate-jar.outputs.jar-name }}" "target/${{ matrix.artifact-name }}.jar"

      - name: Upload Fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-jar
          path: target/${{ matrix.artifact-name }}.jar
          retention-days: 14
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3 : Windows installer via jpackage (.exe, JRE bundled)
  # ──────────────────────────────────────────────────────────────────────────────
  package-windows:
    name: Package Windows Installer (.exe)
    runs-on: windows-latest
    needs: [version, build-fatjar]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Download  Windows Fat JAR
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-windows-jar
          path: dist

      - name: Create Windows Installer (.exe)
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          # jpackage only accepts X.Y.Z → remove suffixes like -SNAPSHOT etc.
          APP_VERSION=$(echo "$VERSION" | grep -oP '^\d+\.\d+\.\d+')
          APP_VERSION=${APP_VERSION:-"1.0.0"}

          jpackage \
            --type exe \
            --name "ConnectedNeighboursAdmin" \
            --app-version "$APP_VERSION" \
            --vendor "Connected Neighbours" \
            --input dist \
            --main-jar admin-desktop-windows.jar \
            --main-class com.connectedneighbours.Launcher \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --java-options "-Dfile.encoding=UTF-8" \
            --dest installer \
            --win-shortcut \
            --win-menu \
            --win-menu-group "Connected Neighbours" \
            --win-dir-chooser

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: admin-desktop-installer-exe
          path: installer/*.exe
          retention-days: 14
          if-no-files-found: error

  # ────────────────────────────────────────────
  # Job 4 : Create GitHub Release
  # ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-fatjar, package-windows]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download Fat JAR Windows
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-windows-jar
          path: dist

      - name: Download Fat JAR Linux
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-linux-jar
          path: dist

      - name: Download Fat JAR macOS
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-macos-jar
          path: dist

      - name: Download Windows Installer
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-installer-exe
          path: dist

      # Sur main uniquement : le pom devient la source de vérité de la version.
      # Sur dev on ne commite rien — le tag de prerelease porte la version, et des
      # commits de release sur dev entreraient en conflit à la merge vers main.
      - name: Set up JDK 21
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Commit du bump de version
        id: bump
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion="${{ needs.version.outputs.version }}" \
            -DgenerateBackupPoms=false

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml

          if git diff --cached --quiet; then
            echo "pom déjà à la bonne version, rien à commiter"
          else
            # [skip ci] + les pushes via GITHUB_TOKEN ne déclenchent pas de workflow :
            # deux garde-fous indépendants contre une boucle de release.
            git commit -m "chore(release): ${{ needs.version.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.release-name }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          # Le tag doit pointer sur le commit dont le pom porte réellement la version.
          target_commitish: ${{ steps.bump.outputs.sha || github.sha }}
          generate_release_notes: true
          files: |
            dist/*.jar
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
