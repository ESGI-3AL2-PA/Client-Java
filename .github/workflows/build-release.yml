name: Build & Release

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────
  # Job 1 : Compilation + tests
  # ────────────────────────────────────────────
  build-linux:
    name: Compile & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compilation check
        run: mvn -B -ntp compile

      - name: Run tests
        run: mvn -B -ntp test

  # ────────────────────────────────────────────
  # Job 2 : Fat JAR (Windows, Linux, macOS)
  # ────────────────────────────────────────────
  build-fatjar:
    name: Build Fat JAR (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-linux
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: admin-desktop-windows
          - os: ubuntu-latest
            artifact-name: admin-desktop-linux
          - os: macos-latest
            artifact-name: admin-desktop-macos
    outputs:
      pom-version: ${{ steps.pom-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package Fat JAR (prod endpoints, skip tests)
        run: mvn -B -ntp -Pprod package -DskipTests

      - name: Locate fat JAR
        id: locate-jar
        shell: bash
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name "*.jar" ! -name "original-*.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::No fat JAR found in target/"
            exit 1
          fi
          JAR_NAME=$(basename "$JAR_PATH")
          echo "jar-path=$JAR_PATH"  >> "$GITHUB_OUTPUT"
          echo "jar-name=$JAR_NAME"  >> "$GITHUB_OUTPUT"
          echo "Fat JAR trouvé : $JAR_NAME"

      - name: Lire la version du pom.xml
        id: pom-version
        shell: bash
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Renommer le JAR
        shell: bash
        run: |
          cp "target/${{ steps.locate-jar.outputs.jar-name }}" "target/${{ matrix.artifact-name }}.jar"

      - name: Upload Fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-jar
          path: target/${{ matrix.artifact-name }}.jar
          retention-days: 14
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3 : Windows installer via jpackage (.exe, JRE bundled)
  # ──────────────────────────────────────────────────────────────────────────────
  package-windows:
    name: Package Windows Installer (.exe)
    runs-on: windows-latest
    needs: build-fatjar
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Download  Windows Fat JAR
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-windows-jar
          path: dist

      - name: Create Windows Installer (.exe)
        shell: bash
        run: |
          VERSION="${{ needs.build-fatjar.outputs.pom-version }}"
          # jpackage only accepts X.Y.Z → remove suffixes like -SNAPSHOT etc.
          APP_VERSION=$(echo "$VERSION" | grep -oP '^\d+\.\d+\.\d+')
          APP_VERSION=${APP_VERSION:-"1.0.0"}

          jpackage \
            --type exe \
            --name "ConnectedNeighboursAdmin" \
            --app-version "$APP_VERSION" \
            --vendor "Connected Neighbours" \
            --input dist \
            --main-jar admin-desktop-windows.jar \
            --main-class com.connectedneighbours.Launcher \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --java-options "-Dfile.encoding=UTF-8" \
            --dest installer \
            --win-shortcut \
            --win-menu \
            --win-menu-group "Connected Neighbours" \
            --win-dir-chooser

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: admin-desktop-installer-exe
          path: installer/*.exe
          retention-days: 14
          if-no-files-found: error

  # ────────────────────────────────────────────
  # Job 4 : Create GitHub Release
  # ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-fatjar, package-windows]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Fat JAR Windows
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-windows-jar
          path: dist

      - name: Download Fat JAR Linux
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-linux-jar
          path: dist

      - name: Download Fat JAR macOS
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-macos-jar
          path: dist

      - name: Download Windows Installer
        uses: actions/download-artifact@v8
        with:
          name: admin-desktop-installer-exe
          path: dist

      - name: Calculate release metadata
        id: vars
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          POM_VERSION="${{ needs.build-fatjar.outputs.pom-version }}"

          if [ "$BRANCH" = "main" ]; then
            echo "tag=v${POM_VERSION}-${GITHUB_RUN_NUMBER}"          >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                                   >> "$GITHUB_OUTPUT"
            echo "release_name=Release v${POM_VERSION} (#${GITHUB_RUN_NUMBER})" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${POM_VERSION}-dev.${GITHUB_RUN_NUMBER}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                                    >> "$GITHUB_OUTPUT"
            echo "release_name=Pre-release dev v${POM_VERSION} (#${GITHUB_RUN_NUMBER})" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.release_name }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.jar
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
