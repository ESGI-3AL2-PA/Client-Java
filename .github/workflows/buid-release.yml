name: Build & Release

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:


  build:
    name: Build, test & package
    runs-on: ubuntu-latest
    outputs:
      jar-name: ${{ steps.locate-jar.outputs.jar-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compilation check
        run: mvn -B -ntp compile

      - name: Run tests
        run: mvn -B -ntp test

      - name: Package (Fat JAR via Maven Shade)
        run: mvn -B -ntp package -DskipTests

      - name: Locate fat JAR
        id: locate-jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name "*.jar" ! -name "original-*.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::Aucun Fat JAR trouvé dans target/"
            exit 1
          fi
          echo "jar-path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "jar-name=$(basename "$JAR_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-desktop-jar
          path: target/${{ steps.locate-jar.outputs.jar-name }}
          retention-days: 14
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: admin-desktop-jar
          path: dist

      - name: Compute release metadata
        id: vars
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          POM_VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)

          if [ "$BRANCH" = "main" ]; then
            echo "tag=v${POM_VERSION}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=Release v${POM_VERSION} (#${GITHUB_RUN_NUMBER})" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${POM_VERSION}-dev.${GITHUB_RUN_NUMBER}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Pre-release dev v${POM_VERSION} (#${GITHUB_RUN_NUMBER})" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.release_name }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}